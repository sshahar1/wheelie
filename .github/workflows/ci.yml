name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dance_performance_bot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dance_performance_bot
      WHATSAPP_ACCESS_TOKEN: ci-placeholder
      WHATSAPP_PHONE_NUMBER_ID: ci-placeholder
      WHATSAPP_VERIFY_TOKEN: ci-placeholder
      WHATSAPP_APP_SECRET: ci-placeholder
      WHATSAPP_ACTIVATION_KEYWORD: "@bot"
      OPENAI_API_KEY: ci-placeholder

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm test
